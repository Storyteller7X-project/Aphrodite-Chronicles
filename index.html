  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#07090f;background-image:radial-gradient(1100px 560px at 50% -8%,rgba(201,168,106,.10),transparent 60%),radial-gradient(900px 520px at 100% 112%,rgba(70,95,150,.07),transparent 60%);background-attachment:fixed;color:#ece0c6;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-thumb{background:rgba(201,168,106,.35);border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #c8a96e55}50%{text-shadow:0 0 44px #c8a96ecc}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fu{animation:fadeUp .35s ease forwards}
  .glow{animation:glow 3s ease infinite}
  .spin{animation:spin 1.2s linear infinite}
  .btn{transition:transform .1s;cursor:pointer}
  .btn:active{transform:scale(.97)}
  .btn:disabled{cursor:not-allowed;opacity:.3}
  @keyframes cardIn{0%{opacity:0;transform:rotateY(90deg) scale(.6)}60%{opacity:1;transform:rotateY(-8deg) scale(1.07)}100%{opacity:1;transform:rotateY(0) scale(1)}}
  @keyframes auraPulse{0%,100%{opacity:.45;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.18)}}
  @keyframes flash{0%{opacity:.9}100%{opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes sparkle{0%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:1}100%{opacity:0;transform:scale(1.5) rotate(160deg)}}
  @keyframes ringExpand{0%{opacity:.85;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.4)}}
  .packcard{animation:cardIn .55s cubic-bezier(.2,1.3,.4,1) both}
  .shake{animation:shake .55s ease}
  .coin{display:inline-block;width:.74em;height:.74em;border-radius:50%;background:radial-gradient(circle at 34% 30%,#f6e3ad,#c9a86a 58%,#8f7236);box-shadow:inset 0 0 0 1px rgba(0,0,0,.4),0 0 5px rgba(201,168,106,.5);vertical-align:-.04em;margin-right:.18em}
  .btn:hover:not(:disabled){filter:brightness(1.08)}
  .gild{background:linear-gradient(180deg,#f1dca6,#c9a86a 55%,#a9863f);-webkit-background-clip:text;background-clip:text;color:transparent}
